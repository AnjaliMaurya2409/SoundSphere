<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundSphere - Music Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="library-container">

        <!-- Header -->
        <header>
            <h1>🎵 SoundSphere</h1>
            <p>Your Personal Music Experience</p>
        </header>

        <!-- Search -->
        <div class="search-box">
            <input
                type="text"
                id="searchInput"
                placeholder="Search songs..."
            >
        </div>

        <!-- Upload Songs -->
        <div class="upload-section">
            <label for="songUpload" class="upload-btn">
                ➕ Add Songs
            </label>

            <input
                type="file"
                id="songUpload"
                accept="audio/*"
                multiple
                hidden
            >
        </div>

        <!-- Song List -->
        <div id="songList" class="song-list">

            <!-- Default Songs -->

            <div class="song-card"
                 onclick="selectSong(0)">

                <div class="song-details">
                    <h3>Dreams</h3>
                    <p>Artist One</p>
                </div>

                <button class="play-btn">
                    ▶
                </button>

            </div>

            <div class="song-card"
                 onclick="selectSong(1)">

                <div class="song-details">
                    <h3>Night Drive</h3>
                    <p>Artist Two</p>
                </div>

                <button class="play-btn">
                    ▶
                </button>

            </div>

            <div class="song-card"
                 onclick="selectSong(2)">

                <div class="song-details">
                    <h3>Sunrise</h3>
                    <p>Artist Three</p>
                </div>

                <button class="play-btn">
                    ▶
                </button>

            </div>

        </div>

    </div>

<script src="script.js"></script>

</body>
</html>
