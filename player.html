<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundSphere - Now Playing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player-container">

    <!-- Back Button -->
    <button class="back-btn" onclick="goBack()">
        ← Library
    </button>

    <!-- Album Art -->
    <div class="cover-container">
        <img
            id="cover"
            src="https://picsum.photos/400?random=1"
            alt="Album Cover"
        >
    </div>

    <!-- Song Info -->
    <div class="song-info">

        <h2 id="title">
            Select a Song
        </h2>

        <p id="artist">
            Artist
        </p>

    </div>

    <!-- Progress Bar -->

    <div class="time-container">

        <span id="currentTime">
            0:00
        </span>

        <span id="duration">
            0:00
        </span>

    </div>

    <input
        type="range"
        id="progress"
        value="0"
        min="0"
        max="100"
    >

    <!-- Controls -->

    <div class="controls">

        <button id="prevBtn">
            ⏮
        </button>

        <button id="playBtn">
            ▶
        </button>

        <button id="nextBtn">
            ⏭
        </button>

    </div>

    <!-- Extra Controls -->

    <div class="extra-controls">

        <button id="shuffleBtn">
            🔀 Shuffle
        </button>

        <button id="repeatBtn">
            🔁 Repeat
        </button>

    </div>

    <!-- Volume -->

    <div class="volume-container">

        <span>🔊</span>

        <input
            type="range"
            id="volume"
            min="0"
            max="1"
            step="0.01"
            value="1"
        >

    </div>

</div>

<audio id="audio"></audio>

<script src="script.js"></script>

</body>
</html>
